name: screenshot_organizer_ai
description: Automatically detect, read, and organize screenshots with AI-powered OCR and smart categorization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
 
  # OCR
  google_mlkit_text_recognition: ^0.14.0

  # Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # File System & Permissions
  path_provider: ^2.1.5
  photo_manager: ^3.6.1
  permission_handler: ^11.3.1

  # Background Processing
  workmanager: ^0.5.2

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.3.4

  # UI
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.2.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2

  # Utilities
  crypto: ^3.0.6
  intl: ^0.19.0
  image: ^4.3.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Inter font — downloaded by CI, or available locally in assets/fonts/
  # If font files are missing, Flutter gracefully falls back to system font
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
